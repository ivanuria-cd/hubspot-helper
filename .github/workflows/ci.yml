# CI del proyecto (SPEC-0000 §8/§11; informe 2026-07-02, hallazgo 11.1).
# unit: typecheck + lint + paridad i18n/tutoriales + suite unitaria (rápido, en cada push/PR).
# e2e: retirado del CI (SPEC-0002 §29) — inestable en GitHub Actions; se ejecuta en local.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run check:locales
      - run: npm run check:tutoriales
      - run: npm run test:unit
