appId: com.clouddistrict.revops
productName: RevOps Assistant
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  # Informe 2026-07-02 §12.3: los outDir composite de los tsconfig no van al instalable.
  - '!out/*-types/**'
  - package.json
publish:
  provider: github
  owner: ivanuria-cd
  repo: hubspot-helper
mac:
  target: dmg
  category: public.app-category.productivity
win:
  target: nsis
linux:
  target: AppImage
  category: Office
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
